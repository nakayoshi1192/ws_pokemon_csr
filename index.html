
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poke'mon（CSR版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"><p class="p-8">読み込み中...</p></div>

  <script type="text/babel">
    function App({ pokemonList }) {
      const [details, isDetails] = React.useState({});
      const [lang, selectLang]   = React.useState("en");

      const detailsToggle = (id) => {
        isDetails(prev => ({
          ...prev,
          [id]: !prev[id]
        }));
      };


      return (
        <main className="p-8">
          <h1 className="text-2xl font-bold">Pokemon</h1>
          <div className="grid grid-cols-4 gap-4 mt-4">
            {pokemonList.map((pokemon, index) => {
              const id = index + 1;
              return (
                <div
                  key={pokemon.name}
                  className="border border-gray-300"
                >
                  <button
                    onClick={() => detailsToggle(id)}
                    className="w-full text-center rounded-lg p-4"
                  >
                    <img
                      className="m-auto"
                      src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/${id}.gif`}
                      alt={pokemon.name}
                      width={6}
                      height={6}
                    />
                    <div>
                      No.{id}
                    </div>
                    <div className="font-bold capitalize">
                      <JaName id={id} />
                    </div>
                    {details[id] &&
                      <Details id={id} />
                    }
                  </button>
                </div>
              );
            })}
          </div>
        </main>
      );
    }

    fetch('https://pokeapi.co/api/v2/pokemon?limit=151')
      .then(res => res.json())
      .then(data => {
        ReactDOM.createRoot(document.getElementById('root')).render(
          <App pokemonList={data.results} />
        );
      }
    );

    function JaName({ id }) {
      const [data, setData] = React.useState(null);

      React.useEffect(() => {
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
          .then(res => res.json())
          .then(json => setData(json));
      }, [id]);

      if (!data) return <p>読み込み中...</p>;

      return (
        data.names.map((n, index) =>
          n.language.name === "ja-hrkt" &&
          <span key={index}>{n.name}</span>
        )
      )
    }


    function Details({ id }) {
      const [data, setData] = React.useState(null);

      React.useEffect(() => {
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`)
          .then(res => res.json())
          .then(json => setData(json));
      }, [id]);

      if (!data) return <p>読み込み中...</p>;

      return (
        <div>
          <dl className="flex justify-start text-sm">
            <dt>タイプ：</dt>
            <dd className="flex justify-start items-center">
              {
                data.types.map((t, index) =>
                  <Type key={index} url={t.type.url} />
                )
              }
              </dd>
          </dl>
          <dl className="flex justify-start text-sm">
            <dt>おもさ：</dt>
            <dd>{data.weight / 10}kg</dd>
          </dl>
          <dl className="flex justify-start text-sm">
            <dt>たかさ：</dt>
            <dd>{data.height / 10}m</dd>
          </dl>
        </div>
      );
    }

    function Type({ url }) {
      const [data, setData] = React.useState(null);

      React.useEffect(() => {
        fetch(url)
          .then(res => res.json())
          .then(json => setData(json));
      }, [url]);

      if (!data) return <p>..</p>;

      return (
        <span className="mr-1">
          <img
          src={data.sprites["generation-viii"]["brilliant-diamond-shining-pearl"]["symbol_icon"]}
          className="inline-block size-[1.25em]"
          />
        </span>
      )
    }


  </script>
</body>
</html>
